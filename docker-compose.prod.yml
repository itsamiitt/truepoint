# docker-compose.prod.yml — single-host PREVIEW deployment of LeadWolf on Ubuntu.
# All four app services share one locally-built image (leadwolf:latest, from deploy/deploy.sh).
# Caddy fronts them with HTTPS + subdomain routing; Postgres is external (Neon/RDS).
# This is NOT production-hardened — see DEPLOY.md "Caveats".
name: leadwolf

# Shared definition for the four app services. They differ only by `command` (+ web's depends_on).
x-app: &app
  image: leadwolf:latest
  env_file: [.env.production]
  environment:
    # Multiline EdDSA PEMs can't live in env_file — deploy.sh exports them into the shell
    # and compose interpolates them here. Empty by default (stack still boots).
    JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM:-}
    JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM:-}
  restart: unless-stopped
  depends_on:
    redis: { condition: service_started }

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  # Postgres is EXTERNAL (managed — Neon / RDS). Point DATABASE_URL at it in .env.production.
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]
    restart: unless-stopped

  typesense:
    image: typesense/typesense:27.1
    command: ["--data-dir", "/data", "--api-key", "${TYPESENSE_API_KEY:-dev}", "--enable-cors"]
    volumes: [tsdata:/data]
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    # Web UI on 8025 (localhost only — view captured email via SSH tunnel).
    ports: ["127.0.0.1:8025:8025"]
    restart: unless-stopped

  # ── One-shot tasks (run by deploy.sh; not started by `up`) ──────────────────────
  migrate:
    <<: *app
    profiles: ["migrate"]
    restart: "no"
    command: ["bun", "run", "--filter", "@leadwolf/db", "migrate"]

  seed:
    <<: *app
    profiles: ["seed"]
    restart: "no"
    command: ["bun", "run", "--filter", "@leadwolf/db", "seed"]

  # ── Application services ────────────────────────────────────────────────────────
  # App services publish NO host ports — Caddy reaches them over the internal network
  # (api:3001, auth:3000, web:3002) and exposes them publicly via the subdomains below.
  api:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/api", "start"]

  auth:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/auth-app", "start"]

  workers:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/workers", "start"]

  web:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/web", "start"]
    depends_on:
      api: { condition: service_started }

  # ── Edge: TLS termination + subdomain routing (auto Let's Encrypt) ──────────────
  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web: { condition: service_started }
      auth: { condition: service_started }
      api: { condition: service_started }
    restart: unless-stopped

volumes:
  redisdata:
  tsdata:
  caddy_data:
  caddy_config:
