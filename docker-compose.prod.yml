# docker-compose.prod.yml — single-host PREVIEW deployment of TruePoint on Ubuntu.
# All four app services share one locally-built image (leadwolf:latest, from deploy/deploy.sh).
# Caddy fronts them with HTTPS + subdomain routing; Postgres is external (Neon/RDS).
# This is NOT production-hardened — see DEPLOY.md "Caveats".
name: leadwolf

# Shared definition for the four app services. They differ only by `command` (+ web's depends_on).
x-app: &app
  image: leadwolf:latest
  # ALL env — including the base64 EdDSA signing keys (JWT_*_PEM_B64), which deploy.sh persists into
  # .env.production — comes from env_file. We deliberately do NOT also list the keys under `environment:`: a
  # compose `environment:` entry with a `${VAR:-}` empty default takes PRECEDENCE over env_file and would
  # clobber the persisted key to empty on any container start whose shell didn't re-export it (→ importPKCS8
  # throws → login 503s, token_mint_failed). Sourcing the keys only from env_file keeps them durable across
  # `up -d` / restart / reboot. packages/config decodes JWT_*_PEM_B64 → PEM at boot (a raw PEM still wins if set).
  env_file: [.env.production]
  restart: unless-stopped
  depends_on:
    redis: { condition: service_healthy }

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  # Postgres is EXTERNAL (managed — Neon / RDS). Point DATABASE_URL at it in .env.production.
  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  typesense:
    image: typesense/typesense:27.1
    command: ["--data-dir", "/data", "--api-key", "${TYPESENSE_API_KEY:-dev}", "--enable-cors"]
    volumes: [tsdata:/data]
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    # Web UI on 8025 (localhost only — view captured email via SSH tunnel).
    ports: ["127.0.0.1:8025:8025"]
    restart: unless-stopped

  # ── One-shot tasks (run by deploy.sh; not started by `up`) ──────────────────────
  migrate:
    <<: *app
    profiles: ["migrate"]
    restart: "no"
    # Run the script DIRECTLY (not `bun run --filter`): the filter runner buffers stdout behind a spinner in
    # a non-TTY `compose run`, so the migration looks frozen. Direct invocation streams the phase logs live.
    command: ["bun", "run", "packages/db/src/migrate.ts"]

  seed:
    <<: *app
    profiles: ["seed"]
    restart: "no"
    command: ["bun", "run", "packages/db/src/seed.ts"]

  # ── Application services ────────────────────────────────────────────────────────
  # App services publish NO host ports — Caddy reaches them over the internal network
  # (api:3001, auth:3000, web:3002) and exposes them publicly via the subdomains below.
  api:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/api", "start"]
    healthcheck:
      # Use bun (always in the image), not wget — the oven/bun base is debian-slim and has no wget/curl.
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1),()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  auth:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/auth-app", "start"]
    healthcheck:
      # Any HTTP response (200/redirect) = server up; fetch only throws on a refused connection.
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/login',{redirect:'manual'}).then(()=>process.exit(0),()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  workers:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/workers", "start"]

  web:
    <<: *app
    command: ["bun", "run", "--filter", "@leadwolf/web", "start"]
    # Explicit depends_on REPLACES the anchor's (YAML merge isn't deep), so re-list redis here too.
    depends_on:
      redis: { condition: service_healthy }
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3002/',{redirect:'manual'}).then(()=>process.exit(0),()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  # ── Edge: TLS termination + subdomain routing (auto Let's Encrypt) ──────────────
  caddy:
    image: caddy:2
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web: { condition: service_healthy }
      auth: { condition: service_healthy }
      api: { condition: service_healthy }
    restart: unless-stopped

volumes:
  redisdata:
  tsdata:
  caddy_data:
  caddy_config:
